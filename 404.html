<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>페이지를 찾을 수 없습니다 | 이창섭 · CS Lee</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 2rem; background: #f7f5ef; color: #0b1f3a; font-family: Arial, "Noto Sans KR", sans-serif; }
      main { width: min(680px, 100%); border-top: 1px solid rgba(11,31,58,.22); padding-top: 2rem; }
      small { font-family: monospace; letter-spacing: .1em; color: #6b7280; }
      h1 { margin: 1.2rem 0; font-size: clamp(2.5rem, 9vw, 5.5rem); line-height: 1; letter-spacing: -.06em; }
      p { max-width: 34rem; color: #4c5760; }
      a { display: inline-flex; margin-top: 1rem; padding: .9rem 1.1rem; background: #0b1f3a; color: #fff; text-decoration: none; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <small>404 / PAGE NOT FOUND</small>
      <h1>요청한 페이지를<br />찾을 수 없습니다.</h1>
      <p>주소가 변경되었거나 존재하지 않는 페이지입니다. 홈페이지로 돌아가 다시 확인해 주세요.</p>
      <a href="/">홈페이지로 돌아가기 →</a>
    </main>
  </body>
</html>
